<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slot Machine</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      margin-top: 50px;
    }

    .reels {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    img {
      width: 120px;
      height: 120px;
      background: #222;
      border-radius: 10px;
      padding: 10px;
    }

    .win {
      border: 4px solid gold;
      box-shadow: 0 0 15px gold;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #ffcc00;
    }

    #result {
      margin-top: 20px;
      font-size: 24px;
    }
  </style>
</head>

<body>

  <h1>🎰 Slot Machine</h1>

  <div class="reels">
    <img id="reel1" src="assets/sprites/cherry.png">
    <img id="reel2" src="assets/sprites/lemon.png">
    <img id="reel3" src="assets/sprites/orange.png">
  </div>

  <button id="spinBtn">SPIN</button>

  <div id="result"></div>

  <!-- Your script -->
  <script src="assets/js/script.js"></script>

</body>
</html>
